<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Log File - LogLens</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #064e3b 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--accent);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.05);
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-hover);
        }

        .upload-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        /* Hide the default file input but keep it in the form */
        #logfile {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .selected-file-msg {
            display: none;
            color: #34d399;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 2rem;
            width: 100%;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <h1>LogLens</h1>
        <p class="subtitle">Upload your .log file for analysis</p>

        <!-- Standard HTML Form submission -->
        <form action="http://127.0.0.1:5001/upload" method="POST" enctype="multipart/form-data">
            
            <div class="upload-zone" id="dropZone">
                <span class="upload-icon">📁</span>
                <h3 style="margin: 0; font-size: 1.1rem;">Click or drag file here</h3>
                <p style="margin: 0.5rem 0 0 0; font-size: 0.85rem; color: var(--text-muted);">Only .log files are supported</p>
                
                <!-- The actual file input used by the form -->
                <input type="file" id="logfile" name="logfile" accept=".log" required />
            </div>

            <div class="selected-file-msg" id="fileMsg">File selected: <span id="fileName"></span></div>

            <button type="submit" class="btn" id="submitBtn">Upload File</button>
        </form>
    </div>
</div>

<script>
    const fileInput = document.getElementById('logfile');
    const dropZone = document.getElementById('dropZone');
    const fileMsg = document.getElementById('fileMsg');
    const fileNameDisplay = document.getElementById('fileName');

    // Visual feedback for drag and drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    // Show selected file name
    fileInput.addEventListener('change', function(e) {
        if (this.files && this.files.length > 0) {
            fileNameDisplay.textContent = this.files[0].name;
            fileMsg.style.display = 'block';
            dropZone.style.borderColor = '#34d399'; // green ring on success
        } else {
            fileMsg.style.display = 'none';
            dropZone.style.borderColor = 'var(--accent)';
        }
    });


</script>

</body>
</html>
